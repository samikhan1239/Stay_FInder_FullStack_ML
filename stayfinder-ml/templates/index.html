<!DOCTYPE html>
<html>
<head>
    <title>StayFinder Price Prediction</title>
</head>
<body>

    <h2>StayFinder Price Prediction</h2>

    <form action="/predict" method="post">

   <label>Location:</label>
<select name="location" required>
    {% for loc in locations %}
        <option value="{{ loc }}">{{ loc }}</option>
    {% endfor %}
</select>
<br><br>


        <label>Guests:</label>
        <input type="number" name="guests" required><br><br>

        <label>Bedrooms:</label>
        <input type="number" name="bedrooms" required><br><br>

        <label>Beds:</label>
        <input type="number" name="beds" required><br><br>

        <label>Bathrooms:</label>
        <input type="number" name="bathrooms" required><br><br>

        <h3>Amenities (1 = Yes, 0 = No)</h3>

        Wifi: <input type="number" name="wifi" min="0" max="1" required><br><br>
        Parking: <input type="number" name="parking" min="0" max="1" required><br><br>
        Kitchen: <input type="number" name="kitchen" min="0" max="1" required><br><br>
        Pool: <input type="number" name="pool" min="0" max="1" required><br><br>
        Gym: <input type="number" name="gym" min="0" max="1" required><br><br>
        Fireplace: <input type="number" name="fireplace" min="0" max="1" required><br><br>
        Security: <input type="number" name="security" min="0" max="1" required><br><br>

        <button type="submit">Predict Price</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
